apiVersion: v1
kind: Service
metadata:
  name: {{ include "hugo-site.fullname" . }}
  labels:
    {{- include "hugo-site.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "hugo-site.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      protocol: TCP
      targetPort: http
    - name: metrics
      port: {{ .Values.service.metricsPort }}
      protocol: TCP
      targetPort: metrics
