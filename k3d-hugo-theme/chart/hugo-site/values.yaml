replicaCount: 1

image:
  repository: hugo-site
  tag: "0.1.0"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  metricsPort: 9113

containerPorts:
  http: 8080
  status: 8081
  metrics: 9113

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

ingress:
  enabled: true
  className: traefik
  annotations: {}
  hosts:
    - host: hugo.localhost
      paths:
        - path: /
          pathType: Prefix
  tls: []

serviceMonitor:
  enabled: true
  interval: 30s
  path: /metrics
  labels: {}

exporter:
  image:
    repository: nginx/nginx-prometheus-exporter
    tag: "1.4.2"
    pullPolicy: IfNotPresent
